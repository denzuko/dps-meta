# .github/workflows/slsa.yml — SLSA Level 3 provenance + GitHub Release
# Triggered on version tags (v*). Builds binary, attests, releases.

name: SLSA Release

on:
  push:
    tags:
    - 'v*'

env:
  LISP: sbcl-bin
  BINARY: dps-meta

jobs:
  build:
    name: Build binary
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install Roswell + SBCL
      run: "ROS_VER=26.02.116\ncurl -sL \"https://github.com/roswell/roswell/releases/download/v${ROS_VER}/roswell_${ROS_VER}-1_amd64.deb\"\
        \ -o /tmp/roswell.deb\nsudo dpkg -i /tmp/roswell.deb\nros install sbcl-bin\necho \"$HOME/.roswell/bin\" >> $GITHUB_PATH\n"
    - name: Install qlot
      run: "ros install qlot\nqlot --version\n"
    - name: Install dependencies
      run: "qlot install\n"
    - name: OPA gate — Rego syntax
      run: "curl -sL https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static \\\n  -o /usr/local/bin/opa && chmod
        +x /usr/local/bin/opa\nopa check policy/\n"
    - name: Build binary
      run: "git submodule update --init\ncc -o nob -I\"./vendor/\" nob.c\n./nob\nls -la dps-meta\n"
    - name: Generate SHA256 hash
      id: hash
      run: "sha256sum dps-meta > dps-meta.sha256\ncat dps-meta.sha256\necho \"hashes=$(base64 -w0 < dps-meta.sha256)\" >>
        \"$GITHUB_OUTPUT\"\n"
    - name: Upload binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BINARY }}
        path: "dps-meta\ndps-meta.sha256\n"
  provenance:
    name: SLSA provenance
    needs: build
    permissions:
      id-token: write
      contents: write
      actions: read
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.0.0
    with:
      base64-subjects: ${{ needs.build.outputs.hashes }}
      upload-assets: true

  verify:
    name: Verify provenance
    runs-on: ubuntu-24.04
    needs: provenance
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    steps:
    - name: Download binary
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.BINARY }}

    - name: Download provenance
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.BINARY }}.intoto.jsonl

    - name: Install slsa-verifier
      run: |
        curl -sL https://github.com/slsa-framework/slsa-verifier/releases/latest/download/slsa-verifier-linux-amd64 \
          -o /usr/local/bin/slsa-verifier && chmod +x /usr/local/bin/slsa-verifier

    - name: Verify provenance
      run: |
        slsa-verifier verify-artifact ${{ env.BINARY }} \
          --provenance-path ${{ env.BINARY }}.intoto.jsonl \
          --source-uri github.com/denzuko/dps-meta

  release:
    name: GitHub Release
    runs-on: ubuntu-24.04
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
    - name: Download binary
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.BINARY }}

    - name: Download provenance
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.BINARY }}.intoto.jsonl

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ env.BINARY }}
          ${{ env.BINARY }}.sha256
          ${{ env.BINARY }}.intoto.jsonl
        generate_release_notes: true
