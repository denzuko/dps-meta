# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  LISP: sbcl-bin

jobs:
  opa-gate:
    name: OPA policy gate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@v4

    - name: Install OPA
      run: |
        curl -sL https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static \
          -o /usr/local/bin/opa && chmod +x /usr/local/bin/opa

    - name: Check Rego syntax
      run: opa check policy/

  test:
    name: FiveAM attestation specs
    runs-on: ubuntu-24.04
    needs: opa-gate
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Install Roswell + SBCL
      run: "ROS_VER=26.02.116\ncurl -sL \"https://github.com/roswell/roswell/releases/download/v${ROS_VER}/roswell_${ROS_VER}-1_amd64.deb\"\
        \ -o /tmp/roswell.deb\nsudo dpkg -i /tmp/roswell.deb\nros install sbcl-bin\n\
        echo \"$HOME/.roswell/bin\" >> $GITHUB_PATH\n"
    - name: Install qlot
      run: "ros install qlot\n"
    - name: Install dependencies
      run: "qlot install\n"
    - name: Load system check
      run: "qlot exec ros run \\\n  --eval \"(asdf:load-asd (merge-pathnames #P\\\"\
        dps-meta.asd\\\" (uiop:getcwd)))\" \\\n  --eval \"(asdf:load-system :dps-meta)\"\
        \ \\\n  --eval \"(format t \\\"~&dps-meta loaded OK~%\\\")\" \\\n  --eval
        \"(uiop:quit 0)\"\n"
  sbom:
    name: CycloneDX SBOM + OSV scan
    runs-on: ubuntu-24.04
    needs: opa-gate
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install cdxgen
      run: npm install -g @cyclonedx/cdxgen

    - name: Generate SBOM
      run: cdxgen --type generic --output sbom.json .

    - name: Upload SBOM
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sbom.json
        path: sbom.json
