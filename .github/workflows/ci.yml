# .github/workflows/ci.yml

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  LISP: sbcl-bin

jobs:
  opa-gate:
    name: OPA policy gate
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      security-events: write
    steps:
    - uses: actions/checkout@v4

    - name: Install OPA
      run: |
        curl -sL https://openpolicyagent.org/downloads/latest/opa_linux_amd64_static \
          -o /usr/local/bin/opa && chmod +x /usr/local/bin/opa

    - name: Check Rego syntax
      run: opa check policy/

  test:
    name: FiveAM attestation specs
    runs-on: ubuntu-24.04
    needs: opa-gate
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Setup Lisp
      uses: 40ants/setup-lisp@v4
        # No asdf-system: let setup-lisp install ros only; we run qlot ourselves

    - name: Install qlot
      run: ros install qlot

    - name: Install dependencies
      run: qlot install

    - name: Load system check
      run: |
        qlot exec ros run \
          --eval "(asdf:load-system :dps-meta)" \
          --eval "(format t \"~&dps-meta loaded OK~%\")" \
          --eval "(uiop:quit 0)"

  sbom:
    name: CycloneDX SBOM + OSV scan
    runs-on: ubuntu-24.04
    needs: opa-gate
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install cdxgen
      run: npm install -g @cyclonedx/cdxgen

    - name: Generate SBOM
      run: cdxgen --type generic --output sbom.json .

    - name: Upload SBOM
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sbom.json
        path: sbom.json
