# SPDX-License-Identifier: BSD-2-Clause
# action.yml — dps-meta GitHub Action
#
# Usage in a target repo:
#
#   - uses: denzuko/dps-meta@v1
#     with:
#       type: c99-binary   # or: c99-header | lisp-actor | shell-bats | quadlet-stack
#
# The action reads all other values from git config meta.* keys already set
# in the target repo.  No YAML hand-authoring by the caller.
#
# Generated files are committed by the caller's workflow; dps-meta only writes.

name: "dps-meta"
description: >
  Standards scaffolding generator for the denzuko GitHub organisation.
  Reads git config meta.* keys from the checkout, generates governance files,
  CI/CD workflows, Rego policy gates, and net.matrix identity headers.

author: "Den Zuko <den@dapla.net>"

branding:
  icon: "shield"
  color: "green"

inputs:
  type:
    description: >
      Repository type. Must match meta.type git config.
      One of: c99-binary | c99-header | lisp-actor | shell-bats | quadlet-stack
    required: true

runs:
  using: "composite"
  steps:
    - name: Validate type input
      shell: bash
      run: |
        case "${{ inputs.type }}" in
          c99-binary|c99-header|lisp-actor|shell-bats|quadlet-stack)
            echo "type=${{ inputs.type }}" ;;
          *)
            echo "::error::Invalid type '${{ inputs.type }}'. Valid: c99-binary c99-header lisp-actor shell-bats quadlet-stack"
            exit 1 ;;
        esac

    - name: Assert meta.type git config matches action input
      shell: bash
      run: |
        CONFIGURED=$(git config meta.type 2>/dev/null || echo "")
        if [ -z "$CONFIGURED" ]; then
          git config meta.type "${{ inputs.type }}"
          echo "Set meta.type=${{ inputs.type }}"
        elif [ "$CONFIGURED" != "${{ inputs.type }}" ]; then
          echo "::error::meta.type git config ($CONFIGURED) does not match action input (${{ inputs.type }})"
          exit 1
        fi

    - name: Assert required git config keys are set
      shell: bash
      run: |
        missing=0
        for key in meta.application meta.role meta.version meta.branch; do
          val=$(git config "$key" 2>/dev/null || echo "")
          if [ -z "$val" ]; then
            echo "::error::git config $key is not set in this repository"
            missing=1
          fi
        done
        [ "$missing" -eq 0 ] || exit 1

    - name: Download dps-meta binary
      shell: bash
      run: |
        curl -sSfL \
          "https://github.com/denzuko/dps-meta/releases/latest/download/dps-meta-linux-amd64" \
          -o /usr/local/bin/dps-meta
        chmod +x /usr/local/bin/dps-meta

    - name: Verify SLSA provenance of dps-meta binary
      shell: bash
      run: |
        curl -sSfL \
          "https://github.com/denzuko/dps-meta/releases/latest/download/dps-meta-linux-amd64.intoto.jsonl" \
          -o dps-meta.intoto.jsonl
        slsa-verifier verify-artifact /usr/local/bin/dps-meta \
          --provenance-path dps-meta.intoto.jsonl \
          --source-uri github.com/denzuko/dps-meta

    - name: Run dps-meta
      shell: bash
      run: |
        dps-meta
      env:
        DPS_META_TEST_CHECKOUT: ${{ github.workspace }}
