# SPDX-License-Identifier: BSD-2-Clause
# action.yml — dps-meta GitHub Action
#
# Usage in a target repo:
#
#   - uses: denzuko/dps-meta@v1
#     with:
#       type: c99-binary   # or: c99-header | lisp-actor | shell-bats | quadlet-stack

name: "dps-meta"
description: >
  Standards scaffolding generator for the denzuko GitHub organisation.
  Reads git config meta.* keys from the checkout, generates governance files,
  CI/CD workflows, Rego policy gates, and net.matrix identity headers.

author: "Den Zuko <den@dapla.net>"

branding:
  icon: "shield"
  color: "green"

inputs:
  type:
    description: >
      Repository type. One of:
      c99-binary | c99-header | lisp-actor | shell-bats | quadlet-stack
    required: true

runs:
  using: "composite"
  steps:
    - name: Validate type input
      shell: bash
      run: |
        case "${{ inputs.type }}" in
          c99-binary|c99-header|lisp-actor|shell-bats|quadlet-stack)
            echo "type=${{ inputs.type }}" ;;
          *)
            echo "::error::Invalid type '${{ inputs.type }}'"
            exit 1 ;;
        esac

    - name: Set meta.type git config
      shell: bash
      run: |
        CONFIGURED=$(git config meta.type 2>/dev/null || echo "")
        if [ -z "$CONFIGURED" ]; then
          git config meta.type "${{ inputs.type }}"
        elif [ "$CONFIGURED" != "${{ inputs.type }}" ]; then
          echo "::error::meta.type git config ($CONFIGURED) != action input (${{ inputs.type }})"
          exit 1
        fi

    - name: Assert required git config keys
      shell: bash
      run: |
        for key in meta.application meta.role meta.version meta.branch; do
          val=$(git config "$key" 2>/dev/null || echo "")
          if [ -z "$val" ]; then
            echo "::error::git config $key is not set"
            exit 1
          fi
        done

    - name: Setup Lisp
      uses: 40ants/setup-lisp@v4
      env:
        LISP: sbcl-bin

    - name: Install qlot
      shell: bash
      run: ros install qlot

    - name: Checkout dps-meta source
      uses: actions/checkout@v4
      with:
        repository: denzuko/dps-meta
        ref: ${{ github.action_ref }}
        path: .dps-meta-src

    - name: Install dps-meta dependencies
      shell: bash
      run: |
        cd .dps-meta-src
        qlot install

    - name: Build dps-meta binary
      shell: bash
      run: |
        cd .dps-meta-src
        qlot exec ros build --output ../dps-meta-bin

    - name: Run dps-meta
      shell: bash
      run: |
        export DPS_META_TEST_CHECKOUT="${{ github.workspace }}"
        ./dps-meta-bin

    - name: Cleanup dps-meta source
      shell: bash
      run: rm -rf .dps-meta-src dps-meta-bin
